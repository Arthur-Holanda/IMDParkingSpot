version: "3.8"

services:
  # ========================================
  # Bancos de Dados e Infraestrutura
  # ========================================
  mongo-db:
    image: mongo:4.4
    hostname: mongo-db
    container_name: db-mongo
    expose:
      - "27017"
    ports:
      - "27018:27017"
    networks:
      - fiware_network

  cratedb:
    image: crate:4.6.7
    hostname: cratedb
    container_name: db-crate
    command: crate -Cauth.host_based.enabled=false -Ccluster.name=democluster -Chttp.cors.enabled=true -Chttp.cors.allow-origin="*"
    ports:
      - "4200:4200" # Interface de administração do CrateDB
      - "4300:4300"
    networks:
      - fiware_network

  redis-db:
    image: redis:6
    hostname: redis-db
    container_name: db-redis
    expose:
      - "6379"
    networks:
      - fiware_network

  mosquitto:
    image: eclipse-mosquitto:2.0
    hostname: mosquitto
    container_name: broker-mqtt
    ports:
      - "1883:1883" # Porta padrão MQTT para os sensores
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - fiware_network

  # ========================================
  # FIWARE Generic Enablers (GEs)
  # ========================================
  orion:
    image: fiware/orion:latest
    hostname: orion
    container_name: fiware-orion
    depends_on:
      - mongo-db
    ports:
      - "1026:1026"
    command: -dbURI mongodb://mongo-db:27017 -logLevel DEBUG
    networks:
      - fiware_network

  quantumleap:
    image: orchestracities/quantumleap:latest
    hostname: quantumleap
    container_name: fiware-quantumleap
    depends_on:
      - cratedb
      - redis-db
    ports:
      - "8668:8668"
    environment:
      - CRATE_HOST=cratedb
      - USE_GEOCODING=false
      - REDIS_HOST=redis-db
      - REDIS_PORT=6379
    networks:
      - fiware_network

  iot-agent-mqtt:
    image: fiware/iotagent-ul:latest # Pode usar iotagent-json também dependendo do payload
    hostname: iot-agent
    container_name: fiware-iot-agent
    depends_on:
      - mongo-db
      - mosquitto
      - orion
    ports:
      - "4041:4041" # Porta para provisionamento
    environment:
      - IOTA_CB_HOST=orion
      - IOTA_CB_PORT=1026
      - IOTA_NORTH_PORT=4041
      - IOTA_REGISTRY_TYPE=mongodb
      - IOTA_MONGO_HOST=mongo-db
      - IOTA_MONGO_PORT=27017
      - IOTA_MONGO_DB=iotagentul
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883
      - IOTA_DEFAULT_RESOURCE=/iot/d
    networks:
      - fiware_network

  # ========================================
  # Visualização
  # ========================================
  grafana:
    image: grafana/grafana:latest
    hostname: grafana
    container_name: dashboard-grafana
    depends_on:
      - cratedb
    ports:
      - "3000:3000"
    networks:
      - fiware_network

networks:
  fiware_network:
    driver: bridge